services:
  llm:
    build:
      context: .
      dockerfile: docker/llm.Dockerfile
    container_name: rtlgen-llm
    ports:
      - "8080:8080"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_REPO: ${MODEL_REPO}
      MODEL_ALIAS: ${MODEL_ALIAS:-local}
      CTX_SIZE: ${CTX_SIZE:-4096}
      N_PREDICT: ${N_PREDICT:-512}
      N_GPU_LAYERS: ${N_GPU_LAYERS:-auto}
      BATCH_SIZE: ${BATCH_SIZE:-64}
      UBATCH_SIZE: ${UBATCH_SIZE:-32}
      THREADS: ${THREADS:-4}
      PARALLEL: ${PARALLEL:-1}
    volumes:
      - llm_models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 20m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: rtlgen-app
    user: "${UID}:${GID}"
    depends_on:
      - llm
    environment:
      LLM_BASE_URL: http://llm:8080
      LLM_MODEL_ALIAS: ${MODEL_ALIAS:-local}
      LLM_SYSTEM_PROMPT: ${LLM_SYSTEM_PROMPT:-You are a careful coding assistant for Python, Verilog and SystemVerilog. Return only the requested artifact unless asked to explain.}
      TERM: xterm-256color
      FORCE_COLOR: "1"
    volumes:
      - .:/app
    command: ["sh", "-lc", "tail -f /dev/null"]

volumes:
  llm_models:

  