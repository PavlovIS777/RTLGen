services:
  llm:
    build:
      context: .
      dockerfile: docker/llm.Dockerfile
    container_name: rtlgen-llm
    ports:
      - "8080:8080"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_REPO: ${MODEL_REPO}
      MODEL_ALIAS: ${MODEL_ALIAS:-local}
      CTX_SIZE: ${CTX_SIZE:-4096}
      N_PREDICT: ${N_PREDICT:-512}
      N_GPU_LAYERS: ${N_GPU_LAYERS:-auto}
      BATCH_SIZE: ${BATCH_SIZE:-64}
      UBATCH_SIZE: ${UBATCH_SIZE:-32}
      THREADS: ${THREADS:-4}
      PARALLEL: ${PARALLEL:-1}
      TEMPERATURE: ${TEMPERATURE:-}
      TOP_P: ${TOP_P:-}
      REPEAT_PENALTY: ${REPEAT_PENALTY:-}
    volumes:
      - ./models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 20m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: rtlgen-app
    user: "${UID}:${GID}"
    depends_on:
      - llm
    environment:
      TERM: xterm-256color
      FORCE_COLOR: "1"
      PYTHONPATH: /app
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai_compatible}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://llm:8080}
      MODEL_NAME: ${MODEL_NAME:-local}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_TIMEOUT_SEC: ${MODEL_TIMEOUT_SEC:-3600}
      MODEL_READY_TIMEOUT_SEC: ${MODEL_READY_TIMEOUT_SEC:-3600}
      MODEL_READY_POLL_SEC: ${MODEL_READY_POLL_SEC:-5}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-3}
      MODEL_TOKEN_PARAM: ${MODEL_TOKEN_PARAM:-auto}
      MODEL_USER_SUFFIX: ${MODEL_USER_SUFFIX:-}
      MODEL_REASONING_CONTENT_MODE: ${MODEL_REASONING_CONTENT_MODE:-ignore}
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "tail -f /dev/null"]
  
